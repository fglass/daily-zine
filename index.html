<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fred Talks</title>
    <link rel="alternate" type="application/rss+xml" title="Fred Talks RSS" href="feed.xml">
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe4;
        --paper: rgba(255, 252, 245, 0.9);
        --ink: #1e1b18;
        --muted: #6f665f;
        --rule: rgba(30, 27, 24, 0.14);
        --accent: #a33a2b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(163, 58, 43, 0.16), transparent 34rem),
          linear-gradient(180deg, #ede5d4 0%, var(--bg) 52%, #e8deca 100%);
        color: var(--ink);
        font-family: "Times New Roman", Times, serif;
      }

      main {
        width: min(52rem, calc(100vw - 2rem));
        margin: 3rem auto;
        padding: 2.5rem;
        background: var(--paper);
        border: 1px solid var(--rule);
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.08);
      }

      p.kicker {
        margin: 0 0 1rem;
        color: var(--accent);
        font: 600 0.82rem/1.2 "Helvetica Neue", Helvetica, Arial, sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 8vw, 5.5rem);
        line-height: 0.94;
      }

      p.deck {
        max-width: 40rem;
        margin: 1rem 0 2rem;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        border-top: 1px solid var(--rule);
      }

      li {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 0;
        border-bottom: 1px solid var(--rule);
      }

      li span:first-child {
        font-weight: 600;
      }

      a {
        color: inherit;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.14em;
      }

      a:hover {
        color: var(--accent);
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 640px) {
        main {
          margin: 1rem auto;
          padding: 1.25rem;
        }

        li {
          flex-direction: column;
        }
      }
    </style>
  </head>
