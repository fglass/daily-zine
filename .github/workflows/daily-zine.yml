name: Daily Zine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            libcairo2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compute issue date
        run: echo "ISSUE_DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Generate PDFs
        env:
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
        run: |
          uv run ziner --output "output/zine-${ISSUE_DATE}.pdf"
          uv run ziner --fullsize --output "output/zine-${ISSUE_DATE}-fullsize.pdf"

      - name: Check out gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Publish files
        run: |
          cp output/*.pdf gh-pages/
          python .github/scripts/generate-index.py gh-pages

      - name: Commit and push
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "chore: publish zine ${ISSUE_DATE}"
          git push origin gh-pages
